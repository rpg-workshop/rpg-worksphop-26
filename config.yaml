sections:
  - id: "about"
    title: "About the Workshop"
    content: |
      <p>Games and virtual environments have long served as test beds for Artificial Intelligence (AI),
      providing research challenges and benchmarks for assessment of intelligent systems performance.
      The specific application of Automated Planning and Scheduling (APS) technologies in games
      has been gaining popularity for uses both within the gameplay experience and for designing them.</p>
      <p>The <strong>Roles of Planning in Games (RPG)</strong> workshop aims to bring together researchers
      and practitioners to explore the unique challenges and contributions that rise from applying APS
      techniques to games. The focus is specifically on the aspects that directly interest the ICAPS
      community such as reasoning, resource management, hierarchical goal decomposition, and search-based
      methods. The focus on games will also encourage designers and developers to present their needs,
      wants, and challenges to the ICAPS community while having an opportunity to learn more about the
      APS resources available to them.</p>

  - id: "dates"
    title: "Important Dates"
    type: "important_dates"

  - id: "cfp"
    title: "Call for Papers"
    content: |
      <p>We invite submissions on all aspects of Automated Planning and Scheduling (APS) as applied
      to games — including video games, tabletop games, serious games, and game-inspired benchmarks.
      We welcome both theoretical contributions and applied systems.</p>
      <p>The workshop will feature a <strong>Standard Track</strong> of peer-reviewed technical papers
      (short and long) with 8–10 presentations, one or two <strong>Invited Speaker</strong> sessions
      (60 minutes each), and an <strong>Industry Panel</strong> on the "Reality Gap" between academic
      planning and shipping commercial titles.</p>
      <p>We utilize a <strong>double-blind review process</strong> to minimize bias regarding author
      identity or affiliation. Our organizing committee includes people from the U.S., U.K., France,
      and Greece with a mix of academic researchers and industry practitioners.</p>

  - id: "topics"
    title: "Topics of Interest"
    content: |
      <p>Topics include, but are not limited to:</p>
      <ul>
        <li><strong>Decision Making in Games:</strong> Domain-specific heuristics, knowledge
        representation, search methods, and planners for playing and understanding existing games.</li>
        <li><strong>Real-Time Planning:</strong> Techniques for interleaving planning and execution
        under strict time and memory constraints.</li>
        <li><strong>Planning for Quality Assurance:</strong> Using automated planners to generate
        test coverage, detect soft-locks, and validate playable content autonomously.</li>
        <li><strong>Neurosymbolic AI in Games:</strong> Combining neuro-inspired models with symbolic
        planning to create NPCs that are both conversational and goal-directed.</li>
        <li><strong>Hierarchical Planning:</strong> Advances in hierarchical task networks (HTNs)
        tailored for controlling agent behaviors or developing structured game content.</li>
        <li><strong>Plan, Activity, and Goal Recognition:</strong> Inferring player intent to adapt
        game difficulty or content dynamically.</li>
        <li><strong>Procedural Content Generation:</strong> Constraint-based planning for generating
        game content such as solvable levels, puzzles, and narratives.</li>
        <li><strong>Planning for Game Design:</strong> Applications of APS to game or level design
        for videogames and/or tabletop games.</li>
      </ul>

  - id: "submission"
    title: "Submission Instructions"
    content: |
      <p>Submit papers via <strong>EasyChair</strong> using the <strong>ICAPS 2026 paper template</strong>.</p>
      <ul>
        <li>Regular papers: up to <strong>8 pages</strong> + unlimited references</li>
        <li>Short / position papers: up to <strong>4 pages</strong> + unlimited references</li>
        <li>All submissions must be in <strong>PDF format</strong></li>
        <li>Reviewing is <strong>double-blind</strong> — please anonymize your submission</li>
      </ul>
      <p>At least one author of each accepted paper must register for the ICAPS 2026 workshop day.
      Accepted papers will be made available on the workshop website. The workshop does not publish
      formal proceedings, so accepted work may be submitted to other venues.</p>

  - id: "schedule"
    title: "Workshop Schedule"
    content: |
      <p><em>Full schedule to be announced after paper notifications (September 2026).</em></p>
      <ul>
        <li><strong>Standard Track:</strong> 8–10 peer-reviewed paper presentations, 15–20 minutes each including Q&amp;A</li>
        <li><strong>Invited Speaker(s):</strong> One or two 60-minute presentations from senior members of the ICAPS and game communities</li>
        <li><strong>Industry Panel:</strong> 45-minute panel — <em>"The Reality Gap: Academic Planning vs. Shipping Titles"</em> — featuring designers and developers from game studios</li>
      </ul>

  - id: "organizers"
    title: "Organising Committee"
    type: "organizers"

  - id: "committee"
    title: "Program Committee"
    type: "program_committee"
