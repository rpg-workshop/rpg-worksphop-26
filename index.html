<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Workshop Title Banner -->
    <div id="workshop-banner">
        <div class="banner-title" id="banner-title">RPG Workshop</div>
    </div>

    <!-- Battle Scene -->
    <div id="banner-container">
        <div id="battle-scene">
            <div id="hero-hud" class="hud">
                <h3 id="ui-hero-name">Researcher</h3>
                <div class="hp-label">HP</div>
                <div class="hp-bar-bg"><div id="hero-hp-fill" class="hp-bar-fill"></div></div>
            </div>
            <div id="hero-sprite" class="sprite">🧑‍💻</div>

            <div id="boss-hud" class="hud">
                <h3 id="ui-boss-name">Reviewer 2</h3>
                <div class="hp-label">HP</div>
                <div class="hp-bar-bg"><div id="boss-hp-fill" class="hp-bar-fill"></div></div>
            </div>
            <div id="boss-sprite" class="sprite">👹</div>
        </div>

        <div id="rpg-ui">
            <div id="dialogue-box"><span id="dialogue-text">A wild REVIEWER 2 appeared!</span><span id="dialogue-cursor">▮</span></div>
            <div id="action-menu"></div>
        </div>
    </div>

    <nav id="navbar" style="position:relative;">
        <button id="theme-toggle" onclick="toggleTheme()">🌙 DARK</button>
    </nav>

    <main id="content-container"></main>

    <footer>&copy; <span id="year"></span> RPG Workshop Organizing Committee</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
