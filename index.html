<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Workshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Workshop Title Banner -->
    <div id="workshop-banner">
        <div class="banner-title" id="banner-title">RPG Workshop</div>

        <!-- University logo row -->
        <div class="container-fluid mt-4" id="logo-row">
            <div class="row justify-content-center align-items-center g-3">
                <div class="col-4 col-sm-2">
                    <div class="university-logo-slot"><a href="https://www.sift.net/" target="_blank"><img src="logos/sift.png" alt="Smart Information Flow Technologies"></a></div>
                </div>
                <div class="col-4 col-sm-2">
                    <div class="university-logo-slot"><a href="https://www.ed.ac.uk/" target="_blank"><img src="logos/uoe.png" alt="University of Edinburgh"></a></div>
                </div>
                <div class="col-4 col-sm-2">
                    <div class="university-logo-slot"><a href="https://assistive-autonomy.ed.ac.uk/" target="_blank"><img src="logos/CforAI.png" alt="Center for AI in Assistive Autonomy"></a></div>
                </div>
                <div class="col-4 col-sm-2">
                    <div class="university-logo-slot"><a href="https://www.ieseg.fr/en/" target="_blank"><img src="logos/ieseg.png" alt="IESEG"></a></div>
                </div>
                <div class="col-4 col-sm-2">
                    <div class="university-logo-slot"><a href="https://www.uom.gr/en" target="_blank"><img src="logos/UoM.png" alt="University of Macedonia"></a></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Battle Scene -->
    <div id="banner-container">
        <div id="battle-scene">
            <div id="hero-hud" class="hud">
                <h3 id="ui-hero-name">Researcher</h3>
                <div class="hp-label">HP</div>
                <div class="hp-bar-bg"><div id="hero-hp-fill" class="hp-bar-fill"></div></div>
            </div>
            <div id="hero-sprite" class="sprite">🧑‍💻</div>

            <div id="boss-hud" class="hud">
                <h3 id="ui-boss-name">Reviewer 2</h3>
                <div class="hp-label">HP</div>
                <div class="hp-bar-bg"><div id="boss-hp-fill" class="hp-bar-fill"></div></div>
            </div>
            <div id="boss-sprite" class="sprite">👹</div>
        </div>

        <div id="rpg-ui">
            <div id="dialogue-box"><span id="dialogue-text">A wild REVIEWER 2 appeared!</span><span id="dialogue-cursor">▮</span></div>
            <div id="action-menu"></div>
        </div>
    </div>

    <nav id="navbar">

    </nav>

    <main>
        <div class="container" id="content-container"></div>
    </main>

    <footer>&copy; <span id="year"></span> RPG Workshop Organizing Committee</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
